<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amber: Sacred Mist Ring</title>
    <style>
        :root {
            --bg: #000000;
            --amber: #ff9800; 
            --gold: #ffcc00;
            --ui-white: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
            cursor: none;
        }

        canvas {
            display: block;
            width: 100%; height: 100%;
            filter: blur(22px) contrast(1.35); /* Чуть больше контраста для "щелчков" */
            transition: opacity 3.5s ease;
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .breath-guide {
            color: var(--amber);
            font-size: 16px;
            font-weight: 200;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            opacity: 0.45;
            text-align: center;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 1.5s ease;
            text-shadow: 0 0 25px rgba(255, 152, 0, 0.5);
        }

        .controls {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            pointer-events: auto;
        }

        .btn {
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            background: rgba(255, 150, 0, 0.04);
            border: 1px solid rgba(255, 150, 0, 0.12);
        }

        .btn-main { width: 66px; height: 66px; }
        .btn-side { width: 50px; height: 50px; opacity: 0.45; }

        .btn svg {
            width: 22px; height: 22px;
            fill: none;
            stroke: var(--amber);
            stroke-width: 1.3;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.5;
        }

        .btn-side.active { background: rgba(255, 150, 0, 0.25); opacity: 1; }
        .btn-side.active svg { opacity: 1; stroke-width: 2; stroke: var(--gold); }

        body.sleep-mode canvas, 
        body.sleep-mode .breath-guide, 
        body.sleep-mode .btn-side {
            opacity: 0 !important;
            pointer-events: none;
        }

        body.sleep-mode .controls {
            bottom: 50%;
            transform: translateY(50%);
        }

        body.sleep-mode .btn-main {
            background: rgba(255, 255, 255, 0.92);
            width: 74px; height: 74px;
            opacity: 0.78;
            border: none;
        }

        body.sleep-mode .btn-main svg.icon-sleep { display: none; }
        body.sleep-mode .btn-main svg.icon-back { 
            display: block; 
            stroke: #000; 
            stroke-width: 4;
            opacity: 1;
        }

        .icon-back { display: none; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            color: var(--amber); letter-spacing: 0.7em; font-size: 11px;
            text-transform: uppercase;
            transition: opacity 3s ease;
        }
        body.active .overlay { opacity: 0; pointer-events: none; }
    </style>
</head>
<body onclick="start()">

    <div class="overlay" id="starter">коснись тишины</div>

    <canvas id="c"></canvas>
    
    <div class="ui-layer">
        <div class="breath-guide" id="guide">покой</div>
        
        <div class="controls">
            <!-- Mic -->
            <div class="btn btn-side" id="micBtn" onclick="toggleMic(event)">
                <svg id="m-off" viewBox="0 0 24 24"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                <svg id="m-on" viewBox="0 0 24 24" style="display:none;"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </div>

            <!-- Sleep -->
            <div class="btn btn-main" onclick="toggleSleep(event)" id="mainBtn">
                <svg class="icon-sleep" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-back" viewBox="0 0 24 24" style="display:none;"><path d="M15 19l-7-7 7-7"/></svg>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide');
        
        let width, height, particles = [], isStarted = false, isSleeping = false, isMicOn = false;
        let audioCtx, binL, binR, gainL, gainR, noiseGain, sleepNoiseGain, analyser, dataArray, micStream, noiseFilter;
        
        let currentBreath = 1;
        let currentMic = 0;
        let hue = 38; 
        let breathState = 'hold';

        function lerp(a, b, t) { return a + (b - a) * t; }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * 40 + 130; 
                this.x = width/2 + Math.cos(this.angle) * this.radius;
                this.y = height/2 + Math.sin(this.angle) * this.radius;
                this.baseSize = Math.random() * 100 + 320;
                this.alphaBase = Math.random() * 0.05 + 0.18;
                this.hOffset = Math.random() * 12;
                this.rotSpeed = (Math.random() * 0.01 + 0.005) * (Math.random() < 0.5 ? 1 : -1);
                this.drift = Math.random() * 100;
            }
            update() {
                const cx = width / 2;
                const cy = height / 2;
                
                // ВОЗВРАТ ОБЪЯТИЯ: Глубокое сжатие и широкое расширение
                let targetR = 140; 
                if (breathState === 'inhale') targetR = 230; 
                
                const noise = Math.sin(Date.now() * 0.0008 + this.drift) * 30;
                this.radius = lerp(this.radius, targetR + noise, 0.04);
                
                let s = this.rotSpeed;
                if (breathState === 'exhale') s *= 2.5; 
                this.angle += s * (currentBreath + currentMic * 0.9);

                const tx = cx + Math.cos(this.angle) * this.radius;
                const ty = cy + Math.sin(this.angle) * this.radius;
                this.x = lerp(this.x, tx, 0.06);
                this.y = lerp(this.y, ty, 0.06);
            }
            draw() {
                let opacity = this.alphaBase;
                if (breathState === 'inhale') {
                    opacity *= Math.max(0.35, currentBreath);
                }
                
                // ASMR ЩЕЛЧКИ: Добавляем Math.random() для искристости при звуке
                const jitter = (Math.random() * 0.5 + 0.5) * currentMic;
                const s = (this.baseSize * currentBreath + (currentMic * 580 * (0.8 + Math.random() * 0.4))) * 0.85;
                
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s);
                const finalAlpha = opacity * (1 + currentMic * 26); // Выше контраст вспышек
                
                g.addColorStop(0, `hsla(${hue + this.hOffset}, 100%, 55%, ${finalAlpha})`);
                g.addColorStop(0.5, `hsla(${hue - 15}, 95%, 16%, ${finalAlpha * 0.15})`);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(this.x, this.y, s, 0, Math.PI * 2); ctx.fill();
            }
        }

        async function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            binL = audioCtx.createOscillator(); binR = audioCtx.createOscillator();
            gainL = audioCtx.createGain(); gainR = audioCtx.createGain();
            const panL = audioCtx.createStereoPanner(); const panR = audioCtx.createStereoPanner();
            binL.frequency.value = 180; binR.frequency.value = 186;
            gainL.gain.value = gainR.gain.value = 0.035;
            panL.pan.value = -1; panR.pan.value = 1;
            binL.connect(gainL).connect(panL).connect(audioCtx.destination);
            binR.connect(gainR).connect(panR).connect(audioCtx.destination);
            binL.start(); binR.start();

            const noise = audioCtx.createScriptProcessor(4096, 1, 1);
            let lO = 0.0;
            noise.onaudioprocess = (e) => {
                const out = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < 4096; i++) {
                    const w = Math.random() * 2 - 1;
                    out[i] = (lO + (0.018 * w)) / 1.018; 
                    lO = out[i];
                    out[i] *= 6.0; 
                }
            };
            noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass'; noiseFilter.frequency.value = 140; 
            noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0, audioCtx.currentTime);
            noiseGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 10);
            noise.connect(noiseFilter).connect(noiseGain).connect(audioCtx.destination);

            const sleepNoise = audioCtx.createScriptProcessor(4096, 1, 1);
            let lastSleepOut = 0.0;
            sleepNoise.onaudioprocess = (e) => {
                const out = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < 4096; i++) {
                    const white = Math.random() * 2 - 1;
                    out[i] = (lastSleepOut + (0.02 * white)) / 1.02;
                    lastSleepOut = out[i];
                    out[i] *= 3.5; 
                }
            };
            const sleepFilter = audioCtx.createBiquadFilter();
            sleepFilter.type = 'lowpass'; 
            sleepFilter.frequency.value = 100;
            sleepNoiseGain = audioCtx.createGain();
            sleepNoiseGain.gain.setValueAtTime(0, audioCtx.currentTime);
            sleepNoise.connect(sleepFilter).connect(sleepNoiseGain).connect(audioCtx.destination);
        }

        async function toggleMic(e) {
            e.stopPropagation();
            if (!audioCtx) return;
            isMicOn = !isMicOn;
            const btn = document.getElementById('micBtn');
            if (isMicOn) {
                try {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
                    const src = audioCtx.createMediaStreamSource(micStream);
                    analyser = audioCtx.createAnalyser(); analyser.fftSize = 64;
                    src.connect(analyser); 
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    btn.classList.add('active');
                    document.getElementById('m-off').style.display = 'none';
                    document.getElementById('m-on').style.display = 'block';
                } catch(err) { isMicOn = false; }
            } else {
                if (micStream) micStream.getTracks().forEach(t => t.stop());
                analyser = null; currentMic = 0;
                btn.classList.remove('active');
                document.getElementById('m-off').style.display = 'block';
                document.getElementById('m-on').style.display = 'none';
            }
        }

        function toggleSleep(e) {
            e.stopPropagation();
            isSleeping = !isSleeping;
            document.body.classList.toggle('sleep-mode', isSleeping);
            const mainBtn = document.getElementById('mainBtn');
            
            if (isSleeping) {
                if (audioCtx) { 
                    gainL.gain.setTargetAtTime(0, audioCtx.currentTime, 5); 
                    gainR.gain.setTargetAtTime(0, audioCtx.currentTime, 5); 
                    noiseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 3);
                    sleepNoiseGain.gain.setTargetAtTime(0.5, audioCtx.currentTime, 4);
                }
                mainBtn.querySelector('.icon-sleep').style.display = 'none';
                mainBtn.querySelector('.icon-back').style.display = 'block';
            } else {
                if (audioCtx) { 
                    gainL.gain.setTargetAtTime(0.035, audioCtx.currentTime, 3); 
                    gainR.gain.setTargetAtTime(0.035, audioCtx.currentTime, 3); 
                    sleepNoiseGain.gain.setTargetAtTime(0, audioCtx.currentTime, 2);
                }
                mainBtn.querySelector('.icon-sleep').style.display = 'block';
                mainBtn.querySelector('.icon-back').style.display = 'none';
            }
        }

        function update() {
            const time = Date.now() / 1000;
            const cycle = time % 16;
            let targetB = 1;
            let targetHue = 38;
            let targetNoiseGain = 0.15;
            let targetFreq = 140;

            if (cycle < 4) { 
                guide.innerText = "Вдох"; breathState = 'inhale';
                targetB = 0.85 - (cycle / 4) * 0.4; targetHue = 45; 
                targetNoiseGain = 0.08; targetFreq = 180; 
            } else if (cycle < 8) { 
                guide.innerText = "Задержка"; breathState = 'inhale';
                targetB = 0.45; targetHue = 40;
                targetNoiseGain = 0.06; targetFreq = 160;
            } else if (cycle < 12) { 
                guide.innerText = "Выдох"; breathState = 'exhale';
                targetB = 0.45 + ((cycle - 8) / 4) * 1.3; targetHue = 22; 
                targetNoiseGain = 0.25; targetFreq = 120; 
            } else { 
                guide.innerText = "Покой"; breathState = 'exhale';
                targetB = 1.75; targetHue = 38;
                targetNoiseGain = 0.15; targetFreq = 140;
            }

            currentBreath = lerp(currentBreath, targetB, 0.04);
            hue = lerp(hue, targetHue, 0.02);
            
            if (noiseGain && audioCtx && !isSleeping) {
                const dynamicNoise = targetNoiseGain + (currentMic * 0.45);
                noiseGain.gain.setTargetAtTime(dynamicNoise, audioCtx.currentTime, 0.1);
                noiseFilter.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
            }

            if (analyser && isMicOn) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0; for(let i = 0; i < 15; i++) sum += dataArray[i];
                let micT = (sum / 15 / 255) * 8.0; 
                currentMic = lerp(currentMic, micT, 0.18);
            } else { currentMic = lerp(currentMic, 0, 0.1); }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
            ctx.fillRect(0, 0, width, height);
            update();
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function start() {
            if (isStarted) return;
            isStarted = true;
            document.body.classList.add('active');
            for(let i = 0; i < 110; i++) particles.push(new Particle());
            initAudio(); animate();
        }

        document.addEventListener('visibilitychange', () => { if (audioCtx) { if (document.hidden) audioCtx.suspend(); else audioCtx.resume(); } });
    </script>
</body>
</html>
