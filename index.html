<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Погружение: Эмбер</title>
    <style>
        :root {
            --bg: #010000;
            --amber: #ff7b00;
            --deep-red: #4d0500;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
            cursor: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: blur(24px) contrast(1.1);
            transition: opacity 4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ui-layer {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .breath-guide {
            color: var(--amber);
            font-size: 15px;
            font-weight: 200;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            opacity: 0.25;
            transition: opacity 1.5s ease, transform 3s ease;
            text-align: center;
            padding: 0 24px;
        }

        .controls {
            position: absolute;
            bottom: 56px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 14px;
            pointer-events: auto;
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .action-button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255, 80, 0, 0.03);
            border: 1px solid rgba(255, 80, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .action-button svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: var(--amber);
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.45;
            transition: all 0.8s ease;
        }

        .action-button.mic-enabled {
            background: rgba(255, 123, 0, 0.08);
            border-color: rgba(255, 123, 0, 0.22);
            box-shadow: 0 0 24px rgba(255, 123, 0, 0.08);
        }

        .action-button.mic-enabled svg {
            opacity: 0.9;
        }

        .action-button.mic-pending {
            transform: scale(1.04);
        }

        .back-icon { display: none; }

        body.sleep-mode canvas,
        body.sleep-mode .breath-guide {
            opacity: 0 !important;
        }

        body.sleep-mode .controls {
            bottom: 50%;
            transform: translateY(50%);
        }

        body.sleep-mode .action-button {
            background: rgba(255, 255, 255, 0.18);
            border-color: transparent;
            transform: scale(1.06);
            opacity: 0.52;
        }

        body.sleep-mode .action-button svg.sleep-icon { display: none; }
        body.sleep-mode .action-button svg.back-icon {
            display: block;
            opacity: 1;
            stroke: #000;
            stroke-width: 3;
        }

        .start-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--amber);
            letter-spacing: 0.6em;
            font-size: 10px;
            opacity: 1;
            transition: opacity 3.5s ease;
            text-transform: uppercase;
            text-align: center;
            padding: 0 24px;
        }

        body.active .start-overlay {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="start()">
    <div class="start-overlay" id="starter">коснись тишины</div>

    <canvas id="smokeCanvas"></canvas>

    <div class="ui-layer">
        <div class="breath-guide" id="guide">покой</div>

        <div class="controls">
            <div class="action-button" onclick="toggleSleep(event)" id="sleepBtn" aria-label="сон">
                <svg class="sleep-icon" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="back-icon" viewBox="0 0 24 24">
                    <path d="M15 19l-7-7 7-7"/>
                </svg>
            </div>

            <div class="action-button" onclick="requestMicAccess(event)" id="micBtn" aria-label="микрофон">
                <svg viewBox="0 0 24 24">
                    <path d="M12 16a4 4 0 0 0 4-4V8a4 4 0 1 0-8 0v4a4 4 0 0 0 4 4Z"/>
                    <path d="M19 11a7 7 0 0 1-14 0"/>
                    <path d="M12 18v3"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('smokeCanvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide');
        const micBtn = document.getElementById('micBtn');

        let width, height, particles = [], isStarted = false, isSleeping = false;
        let audioCtx, binL, binR, gainL, gainR, noiseGain, panner, analyser, dataArray;
        let micRequested = false, micEnabled = false;
        let mouse = { x: -1000, y: -1000, active: false };
        let hue = 25, breath = 1, micFactor = 0, autoFactor = 0.04;

        const RHYTHM = {
            inhale: 4,
            exhale: 6,
            total: 10
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function easeInOut(t) {
            return 0.5 - 0.5 * Math.cos(Math.PI * t);
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseSize = Math.random() * 200 + 250;
                this.vx = (Math.random() - 0.5) * 0.05;
                this.vy = (Math.random() - 0.5) * 0.05;
                this.alpha = Math.random() * 0.05 + 0.02;
                this.hOffset = Math.random() * 15;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 500) {
                        const f = (500 - d) / 500;
                        const a = Math.atan2(dy, dx);
                        this.vx += Math.cos(a + Math.PI / 1.3) * f * 0.25;
                        this.vy += Math.sin(a + Math.PI / 1.3) * f * 0.25;
                    }
                }
                this.vx *= 0.995;
                this.vy *= 0.995;
                if (this.x < -this.baseSize) this.x = width + this.baseSize;
                if (this.x > width + this.baseSize) this.x = -this.baseSize;
                if (this.y < -this.baseSize) this.y = height + this.baseSize;
                if (this.y > height + this.baseSize) this.y = -this.baseSize;
            }
            draw() {
                const s = this.baseSize * breath + (micFactor * 420);
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s);
                const a = this.alpha * (0.75 + micFactor * 6.5);
                g.addColorStop(0, `hsla(${hue + this.hOffset}, 100%, 50%, ${a})`);
                g.addColorStop(0.5, `hsla(${hue}, 80%, 15%, ${a * 0.12})`);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        async function initBaseAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            binL = audioCtx.createOscillator();
            binR = audioCtx.createOscillator();
            gainL = audioCtx.createGain();
            gainR = audioCtx.createGain();
            const pL = audioCtx.createPanner();
            const pR = audioCtx.createPanner();

            binL.frequency.value = 180;
            binR.frequency.value = 186;
            gainL.gain.value = 0.03;
            gainR.gain.value = 0.03;
            pL.setPosition(-1, 0, 0);
            pR.setPosition(1, 0, 0);

            binL.connect(gainL).connect(pL).connect(audioCtx.destination);
            binR.connect(gainR).connect(pR).connect(audioCtx.destination);
            binL.start();
            binR.start();

            const bS = 4096;
            let lO = 0.0;
            const noise = audioCtx.createScriptProcessor(bS, 1, 1);
            noise.onaudioprocess = (e) => {
                const out = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < bS; i++) {
                    const w = Math.random() * 2 - 1;
                    out[i] = (lO + (0.02 * w)) / 1.02;
                    lO = out[i];
                    out[i] *= 4.2;
                }
            };

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 140;

            noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0, audioCtx.currentTime);
            noiseGain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 8);
            panner = audioCtx.createPanner();
            noise.connect(filter).connect(panner).connect(noiseGain).connect(audioCtx.destination);
        }

        async function requestMicAccess(e) {
            e.stopPropagation();
            if (!isStarted) await start();
            if (!audioCtx) await initBaseAudio();

            micBtn.classList.add('mic-pending');
            guide.innerText = 'микро';

            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                const src = audioCtx.createMediaStreamSource(s);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 32;
                src.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                micRequested = true;
                micEnabled = true;
                micBtn.classList.add('mic-enabled');
                guide.innerText = 'покой';
            } catch (err) {
                micRequested = true;
                micEnabled = false;
                micBtn.classList.remove('mic-enabled');
                guide.innerText = 'без микро';
                setTimeout(() => {
                    if (!isSleeping) guide.innerText = 'покой';
                }, 1400);
            } finally {
                micBtn.classList.remove('mic-pending');
            }
        }

        function updateRhythm() {
            const time = performance.now() / 1000;
            const cycle = time % RHYTHM.total;

            if (cycle < RHYTHM.inhale) {
                const p = easeInOut(cycle / RHYTHM.inhale);
                guide.innerText = 'вдох';
                breath = 1 + p * 0.22;
                hue = 32;
                autoFactor = 0.025 + p * 0.05;
            } else {
                const p = easeInOut((cycle - RHYTHM.inhale) / RHYTHM.exhale);
                guide.innerText = 'выдох';
                breath = 1.22 - p * 0.22;
                hue = 12 + p * 10;
                autoFactor = 0.075 - p * 0.05;
            }
        }

        function update() {
            updateRhythm();

            if (panner && mouse.active && audioCtx) {
                const x = (mouse.x / width) * 2 - 1;
                panner.positionX.setTargetAtTime(x * 5, audioCtx.currentTime, 0.1);
            }

            if (micEnabled && analyser && dataArray) {
                analyser.getByteFrequencyData(dataArray);
                let s = 0;
                for (let i = 0; i < dataArray.length; i++) s += dataArray[i];
                const live = (s / dataArray.length) / 255;
                micFactor = autoFactor + live * 0.45;
            } else {
                micFactor = autoFactor;
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(1, 0, 0, 0.085)';
            ctx.fillRect(0, 0, width, height);
            update();
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        async function start() {
            if (isStarted) return;
            isStarted = true;
            document.body.classList.add('active');
            for (let i = 0; i < 35; i++) particles.push(new Particle());
            await initBaseAudio();
            animate();
        }

        function toggleSleep(e) {
            e.stopPropagation();
            isSleeping = !isSleeping;
            document.body.classList.toggle('sleep-mode', isSleeping);
            if (!audioCtx) return;

            if (isSleeping) {
                gainL?.gain.setTargetAtTime(0, audioCtx.currentTime, 5);
                gainR?.gain.setTargetAtTime(0, audioCtx.currentTime, 5);
                noiseGain?.gain.setTargetAtTime(0, audioCtx.currentTime, 5);
            } else {
                gainL?.gain.setTargetAtTime(0.03, audioCtx.currentTime, 5);
                gainR?.gain.setTargetAtTime(0.03, audioCtx.currentTime, 5);
                noiseGain?.gain.setTargetAtTime(0.1, audioCtx.currentTime, 5);
            }
        }

        const hM = (e) => {
            mouse.active = true;
            mouse.x = e.touches ? e.touches[0].clientX : e.clientX;
            mouse.y = e.touches ? e.touches[0].clientY : e.clientY;
        };

        window.addEventListener('mousemove', hM);
        window.addEventListener('touchmove', hM);
        window.addEventListener('touchend', () => mouse.active = false);
    </script>
</body>
</html>
