<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Погружение: Эмбер (Final)</title>
    <style>
        :root {
            --bg: #010000;
            --amber: #ff7b00;
            --deep-red: #4d0500;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
            cursor: none;
        }

        canvas {
            display: block;
            width: 100%; height: 100%;
            filter: blur(24px) contrast(1.1);
            transition: opacity 4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .breath-guide {
            color: var(--amber);
            font-size: 15px;
            font-weight: 200;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            opacity: 0.25;
            transition: opacity 2s ease, transform 4s ease;
        }

        .controls {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: auto;
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .action-button {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: rgba(255, 80, 0, 0.03);
            border: 1px solid rgba(255, 80, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .action-button svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: var(--amber);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.35;
            transition: all 1s ease;
        }

        .back-icon { display: none; }

        body.sleep-mode canvas,
        body.sleep-mode .breath-guide {
            opacity: 0 !important;
        }

        body.sleep-mode .controls {
            bottom: 50%;
            transform: translateY(50%);
        }

        body.sleep-mode .action-button {
            background: rgba(255, 255, 255, 0.2);
            border-color: transparent;
            transform: scale(1.1);
            opacity: 0.5;
        }

        body.sleep-mode .action-button svg.sleep-icon { display: none; }
        body.sleep-mode .action-button svg.back-icon { 
            display: block; 
            opacity: 1;
            stroke: #000;
            stroke-width: 3;
        }

        .start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--amber);
            letter-spacing: 0.6em;
            font-size: 10px;
            opacity: 1;
            transition: opacity 3.5s ease;
            text-transform: uppercase;
        }
        body.active .start-overlay { opacity: 0; pointer-events: none; }
    </style>
</head>
<body onclick="start()">

    <div class="start-overlay" id="starter">коснись тишины</div>

    <canvas id="smokeCanvas"></canvas>
    
    <div class="ui-layer">
        <div class="breath-guide" id="guide">покой</div>
        
        <div class="controls">
            <div class="action-button" onclick="toggleSleep(event)" id="mainBtn">
                <svg class="sleep-icon" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="back-icon" viewBox="0 0 24 24">
                    <path d="M15 19l-7-7 7-7"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('smokeCanvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide');
        
        let width, height, particles = [], isStarted = false, isSleeping = false;
        let audioCtx, binL, binR, gainL, gainR, noiseGain, panner, analyser, dataArray;
        let mouse = { x: -1000, y: -1000, active: false };
        let hue = 25, breath = 1, micFactor = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseSize = Math.random() * 200 + 250;
                this.vx = (Math.random() - 0.5) * 0.05;
                this.vy = (Math.random() - 0.5) * 0.05;
                this.alpha = Math.random() * 0.05 + 0.02;
                this.hOffset = Math.random() * 15;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (mouse.active) {
                    const dx = mouse.x - this.x, dy = mouse.y - this.y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < 500) {
                        const f = (500 - d) / 500;
                        const a = Math.atan2(dy, dx);
                        this.vx += Math.cos(a + Math.PI/1.3) * f * 0.25;
                        this.vy += Math.sin(a + Math.PI/1.3) * f * 0.25;
                    }
                }
                this.vx *= 0.995; this.vy *= 0.995;
                if (this.x < -this.baseSize) this.x = width + this.baseSize;
                if (this.x > width + this.baseSize) this.x = -this.baseSize;
                if (this.y < -this.baseSize) this.y = height + this.baseSize;
                if (this.y > height + this.baseSize) this.y = -this.baseSize;
            }
            draw() {
                const s = this.baseSize * breath + (micFactor * 450);
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s);
                const a = this.alpha * (0.8 + micFactor * 7);
                g.addColorStop(0, `hsla(${hue + this.hOffset}, 100%, 50%, ${a})`);
                g.addColorStop(0.5, `hsla(${hue}, 80%, 15%, ${a * 0.1})`);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(this.x, this.y, s, 0, Math.PI*2); ctx.fill();
            }
        }

        async function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            binL = audioCtx.createOscillator(); binR = audioCtx.createOscillator();
            gainL = audioCtx.createGain(); gainR = audioCtx.createGain();
            const pL = audioCtx.createPanner(); const pR = audioCtx.createPanner();
            binL.frequency.value = 180; binR.frequency.value = 186;
            gainL.gain.value = gainR.gain.value = 0.035;
            pL.setPosition(-1, 0, 0); pR.setPosition(1, 0, 0);
            binL.connect(gainL).connect(pL).connect(audioCtx.destination);
            binR.connect(gainR).connect(pR).connect(audioCtx.destination);
            binL.start(); binR.start();

            const bS = 4096; let lO = 0.0;
            const noise = audioCtx.createScriptProcessor(bS, 1, 1);
            noise.onaudioprocess = (e) => {
                const out = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < bS; i++) {
                    const w = Math.random() * 2 - 1;
                    out[i] = (lO + (0.02 * w)) / 1.02;
                    lO = out[i]; out[i] *= 4.5;
                }
            };
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass'; filter.frequency.value = 140;
            noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0, audioCtx.currentTime);
            noiseGain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 10);
            panner = audioCtx.createPanner();
            noise.connect(filter).connect(panner).connect(noiseGain).connect(audioCtx.destination);

            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                const src = audioCtx.createMediaStreamSource(s);
                analyser = audioCtx.createAnalyser(); analyser.fftSize = 32;
                src.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            } catch(e) {}
        }

        function update() {
            const time = Date.now() / 1000;
            const cycle = time % 16;
            if (cycle < 4) { guide.innerText = "Вдох"; breath = 1 + (cycle/4)*0.3; hue = 35; }
            else if (cycle < 8) { guide.innerText = "Тишина"; breath = 1.3; hue = 25; }
            else if (cycle < 12) { guide.innerText = "Выдох"; breath = 1.3 - ((cycle-8)/4)*0.3; hue = 8; }
            else { guide.innerText = "Покой"; breath = 1; hue = 25; }

            if (panner && mouse.active) {
                const x = (mouse.x / width) * 2 - 1;
                panner.positionX.setTargetAtTime(x * 5, audioCtx.currentTime, 0.1);
            }

            if (analyser) {
                analyser.getByteFrequencyData(dataArray);
                let s = 0; for(let i=0; i<dataArray.length; i++) s += dataArray[i];
                micFactor = (s / dataArray.length) / 255;
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(1, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            update();
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function start() {
            if (isStarted) return;
            isStarted = true;
            document.body.classList.add('active');
            for(let i=0; i<35; i++) particles.push(new Particle());
            initAudio();
            animate();
        }

        function toggleSleep(e) {
            e.stopPropagation();
            isSleeping = !isSleeping;
            document.body.classList.toggle('sleep-mode', isSleeping);
            if (isSleeping) {
                gainL.gain.setTargetAtTime(0, audioCtx.currentTime, 5);
                gainR.gain.setTargetAtTime(0, audioCtx.currentTime, 5);
            } else {
                gainL.gain.setTargetAtTime(0.035, audioCtx.currentTime, 5);
                gainR.gain.setTargetAtTime(0.035, audioCtx.currentTime, 5);
            }
        }

        const hM = (e) => {
            mouse.active = true;
            mouse.x = e.touches ? e.touches[0].clientX : e.clientX;
            mouse.y = e.touches ? e.touches[0].clientY : e.clientY;
        };
        window.addEventListener('mousemove', hM);
        window.addEventListener('touchmove', hM);
        window.addEventListener('touchend', () => mouse.active = false);
    </script>
</body>
</html>
