<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Эмбер: Бинауральная коррекция</title>
    <style>
        :root {
            --bg: #010000;
            --amber: #ff7b00;
            --deep-red: #4d0500;
            --white-solid: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            touch-action: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            cursor: none;
        }

        #customCursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--amber);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--amber);
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: blur(25px) contrast(1.2);
            transition: opacity 2s ease;
        }

        .ui-layer {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .breath-guide {
            color: var(--amber);
            font-size: 14px;
            font-weight: 200;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            opacity: 0.3;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 123, 0, 0.2);
            transition: opacity 1s ease;
            padding: 0 18px;
        }

        .controls-row {
            position: absolute;
            bottom: 60px;
            display: flex;
            gap: 30px;
            pointer-events: auto;
            transition: bottom 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-base {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 80, 0, 0.05);
            border: 1px solid rgba(255, 80, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
            cursor: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-base svg {
            width: 22px;
            stroke: var(--amber);
            fill: none;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .mic-btn.active { background: rgba(255, 120, 0, 0.2); }
        .mic-btn.active svg { opacity: 1; }

        .start-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--amber);
            letter-spacing: 0.5em;
            font-size: 10px;
            text-transform: uppercase;
            text-align: center;
            padding: 20px;
        }

        body.active .start-overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s;
        }

        body.sleep-mode .ui-layer > *:not(.controls-row) {
            opacity: 0;
        }

        body.sleep-mode canvas {
            opacity: 0.1;
        }

        body.sleep-mode .controls-row {
            bottom: 30px;
        }

        @media (pointer: coarse) {
            #customCursor { display: none; }
            body, html, .btn-base { cursor: default; }
        }
    </style>
</head>
<body onclick="start()">

    <div id="customCursor"></div>
    <div class="start-overlay">
        <span>надень наушники</span>
        <div style="margin-top: 15px; opacity: 0.3; font-size: 8px;">Theta 6Hz • Дифференциация L/R • Пауза 4s</div>
    </div>

    <canvas id="smokeCanvas"></canvas>

    <div class="ui-layer">
        <div class="breath-guide" id="guide">покой</div>

        <div class="controls-row">
            <div class="btn-base mic-btn" onclick="toggleMic(event)" id="micBtn" title="Реакция на голос">
                <svg viewBox="0 0 24 24" id="m-svg" stroke-width="1.5">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                </svg>
            </div>
            <div class="btn-base" onclick="toggleSleep(event)" title="Режим глубокого сна">
                <svg viewBox="0 0 24 24" stroke-width="1.5">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('smokeCanvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide');
        const cursor = document.getElementById('customCursor');
        const micBtn = document.getElementById('micBtn');

        let width, height, particles = [];
        let isStarted = false, isMicOn = false, isSleeping = false;
        let audioCtx = null, binL = null, binR = null, gainL = null, gainR = null, pannerL = null, pannerR = null, noiseGain = null;
        let analyser = null, dataArray = null, micStream = null;
        let mouse = { x: -100, y: -100, active: false };
        let breath = 1, micFactor = 0, basePulse = 0.06, hueShift = 0;
        let driftStrength = 0.12, glowStrength = 1.0;
        let suspendTimer = null;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 250 + 200;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.15 + 0.05;
                this.opacityBase = Math.random() * 0.05 + 0.02;
                this.phase = Math.random() * Math.PI * 2;
            }
            update() {
                this.angle += 0.0012 + driftStrength * 0.003;
                this.x += Math.cos(this.angle) * (this.speed + driftStrength * 0.25);
                this.y += Math.sin(this.angle) * (this.speed + driftStrength * 0.25);

                if (this.x < -this.size) this.x = width + this.size;
                if (this.x > width + this.size) this.x = -this.size;
                if (this.y < -this.size) this.y = height + this.size;
                if (this.y > height + this.size) this.y = -this.size;
            }
            draw() {
                const reactive = Math.max(basePulse, micFactor);
                const s = this.size * breath + reactive * 350;
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, s);
                const a = (this.opacityBase + reactive * 0.45) * glowStrength;
                const h1 = 28 + hueShift;
                const h2 = 16 + hueShift * 0.4;

                g.addColorStop(0, `hsla(${h1}, 100%, 52%, ${a})`);
                g.addColorStop(0.4, `hsla(${h2}, 90%, 22%, ${a * 0.32})`);
                g.addColorStop(1, 'transparent');

                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        async function initAudio() {
            if (audioCtx) return;

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            binL = audioCtx.createOscillator();
            binR = audioCtx.createOscillator();
            gainL = audioCtx.createGain();
            gainR = audioCtx.createGain();
            pannerL = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
            pannerR = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;

            binL.frequency.value = 180;
            binR.frequency.value = 186;
            gainL.gain.value = 0.035;
            gainR.gain.value = 0.035;

            if (pannerL && pannerR) {
                pannerL.pan.value = -1;
                pannerR.pan.value = 1;
                binL.connect(gainL).connect(pannerL).connect(audioCtx.destination);
                binR.connect(gainR).connect(pannerR).connect(audioCtx.destination);
            } else {
                binL.connect(gainL).connect(audioCtx.destination);
                binR.connect(gainR).connect(audioCtx.destination);
            }

            binL.start();
            binR.start();

            const noise = audioCtx.createScriptProcessor(4096, 1, 1);
            let lastOut = 0.0;
            noise.onaudioprocess = (e) => {
                const out = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < 4096; i++) {
                    const white = Math.random() * 2 - 1;
                    out[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = out[i];
                    out[i] *= 4.5;
                }
            };

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 135;
            noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0, audioCtx.currentTime);
            noiseGain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 10);
            noise.connect(filter).connect(noiseGain).connect(audioCtx.destination);
        }

        async function smoothMuteAndSuspend() {
            if (!audioCtx) return;
            try {
                clearTimeout(suspendTimer);
                const now = audioCtx.currentTime;
                gainL?.gain.cancelScheduledValues(now);
                gainR?.gain.cancelScheduledValues(now);
                noiseGain?.gain.cancelScheduledValues(now);
                gainL?.gain.setTargetAtTime(0, now, 0.08);
                gainR?.gain.setTargetAtTime(0, now, 0.08);
                noiseGain?.gain.setTargetAtTime(0, now, 0.08);
                suspendTimer = setTimeout(async () => {
                    try {
                        if (audioCtx && audioCtx.state === 'running') await audioCtx.suspend();
                    } catch {}
                }, 180);
            } catch {}
        }

        async function smoothResume() {
            if (!audioCtx || isSleeping) return;
            try {
                clearTimeout(suspendTimer);
                if (audioCtx.state !== 'running') await audioCtx.resume();
                const now = audioCtx.currentTime;
                gainL?.gain.cancelScheduledValues(now);
                gainR?.gain.cancelScheduledValues(now);
                noiseGain?.gain.cancelScheduledValues(now);
                gainL?.gain.setTargetAtTime(0.035, now, 0.6);
                gainR?.gain.setTargetAtTime(0.035, now, 0.6);
                noiseGain?.gain.setTargetAtTime(0.08, now, 0.8);
            } catch {}
        }

        document.addEventListener('visibilitychange', () => {
            if (!audioCtx) return;
            if (document.hidden) smoothMuteAndSuspend();
            else if (isStarted && !isSleeping) smoothResume();
        });
        window.addEventListener('pagehide', smoothMuteAndSuspend);
        window.addEventListener('blur', smoothMuteAndSuspend);
        window.addEventListener('focus', () => {
            if (isStarted && !isSleeping && !document.hidden) smoothResume();
        });

        async function toggleMic(e) {
            e.stopPropagation();
            if (!isStarted) await start();
            if (!audioCtx) return;

            if (!isMicOn) {
                try {
                    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const src = audioCtx.createMediaStreamSource(micStream);
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 64;
                    analyser.smoothingTimeConstant = 0.82;
                    src.connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    isMicOn = true;
                    micBtn.classList.add('active');
                } catch (err) {
                    isMicOn = false;
                }
            } else {
                if (micStream) micStream.getTracks().forEach(t => t.stop());
                isMicOn = false;
                micFactor = 0;
                analyser = null;
                dataArray = null;
                micStream = null;
                micBtn.classList.remove('active');
            }
        }

        function updateBreath() {
            const time = Date.now() / 1000;
            const cycle = time % 16;

            if (cycle < 4) {
                guide.innerText = 'Вдох';
                breath = 1 + (cycle / 4) * 0.5;
                guide.style.opacity = 0.4;
                basePulse = 0.06 + (cycle / 4) * 0.03;
                hueShift = 4;
                driftStrength = 0.12 + (cycle / 4) * 0.08;
                glowStrength = 1.0 + (cycle / 4) * 0.25;
            } else if (cycle < 8) {
                guide.innerText = 'Задержка';
                breath = 1.5;
                guide.style.opacity = 0.6;
                basePulse = 0.09;
                hueShift = 0;
                driftStrength = 0.2;
                glowStrength = 1.25;
            } else if (cycle < 12) {
                guide.innerText = 'Выдох';
                breath = 1.5 - ((cycle - 8) / 4) * 0.6;
                guide.style.opacity = 0.4;
                basePulse = 0.09 - ((cycle - 8) / 4) * 0.04;
                hueShift = -8;
                driftStrength = 0.2 - ((cycle - 8) / 4) * 0.1;
                glowStrength = 1.25 - ((cycle - 8) / 4) * 0.35;
            } else {
                guide.innerText = 'Покой';
                breath = 0.9;
                guide.style.opacity = 0.2;
                basePulse = 0.05;
                hueShift = -2;
                driftStrength = 0.1;
                glowStrength = 0.9;
            }
        }

        function updateMic() {
            if (analyser && isMicOn && dataArray) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (const v of dataArray) sum += v;
                const live = sum / (dataArray.length * 255);
                micFactor = Math.max(basePulse, live * 1.1);
            } else {
                micFactor = basePulse;
            }
        }

        function updateSpatialAudio() {
            if (!audioCtx || !pannerL || !pannerR || !mouse.active) return;
            const x = ((mouse.x / width) * 2) - 1;
            const left = Math.max(-1, Math.min(1, -0.5 - x * 0.35));
            const right = Math.max(-1, Math.min(1, 0.5 - x * 0.35));
            pannerL.pan.setTargetAtTime(left, audioCtx.currentTime, 0.12);
            pannerR.pan.setTargetAtTime(right, audioCtx.currentTime, 0.12);
        }

        function animate() {
            ctx.fillStyle = 'rgba(1, 0, 0, 0.08)';
            ctx.fillRect(0, 0, width, height);

            updateBreath();
            updateMic();
            updateSpatialAudio();

            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        async function start() {
            if (isStarted) return;
            isStarted = true;
            document.body.classList.add('active');
            cursor.style.opacity = window.matchMedia('(pointer:fine)').matches ? '1' : '0';
            for (let i = 0; i < 35; i++) particles.push(new Particle());
            await initAudio();
            animate();
        }

        function toggleSleep(e) {
            e.stopPropagation();
            document.body.classList.toggle('sleep-mode');
            isSleeping = document.body.classList.contains('sleep-mode');
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const targetVol = isSleeping ? 0.01 : 0.035;
            const noiseVol = isSleeping ? 0.02 : 0.08;
            gainL?.gain.cancelScheduledValues(now);
            gainR?.gain.cancelScheduledValues(now);
            noiseGain?.gain.cancelScheduledValues(now);
            gainL?.gain.setTargetAtTime(targetVol, now, 0.5);
            gainR?.gain.setTargetAtTime(targetVol, now, 0.5);
            noiseGain?.gain.setTargetAtTime(noiseVol, now, 0.5);
        }

        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            mouse.active = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            mouse.active = true;
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', () => {
            mouse.active = false;
        });
    </script>
</body>
</html>
